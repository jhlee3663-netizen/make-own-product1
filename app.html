    * {
      box-sizing: border-box
    }

    body {
      font-family: 'Pretendard', sans-serif;
      background: #f8f9fa;
      margin: 0;
      overflow: hidden
    }

    ::-webkit-scrollbar {
      display: none
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .card-enter {
      animation: slideUp .3s ease-out forwards
    }

    .screen {
      position: fixed;
      inset: 0;
      background: #f8f9fa;
      transition: transform .35s cubic-bezier(.4, 0, .2, 1);
      will-change: transform
    }

    .screen-home {
      transform: translateX(0)
    }

    .screen-home.pushed {
      transform: translateX(-25%)
    }

    .screen-memo {
      transform: translateX(100%)
    }

    .screen-memo.active {
      transform: translateX(0)
    }

    .fab-menu {
      transition: all .2s ease-out;
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px)
    }

    .fab-menu.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0)
    }

    .bottom-sheet {
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.2, .8, .2, 1)
    }

    .bottom-sheet.open {
      transform: translateY(0)
    }

    .ai-text {
      background: linear-gradient(90deg, #228bed, #c509d6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .exercise-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch
    }

    input::placeholder,
    textarea::placeholder {
      color: #adb5bd
    }

    input:focus,

    }

    /* =========================================================
       DonutChart
       ========================================================= */
    function DonutChart({ carb, protein, fat }) {
      const cx = 60, cy = 60, R = 45, SW = 22, C = 2 * Math.PI * R;
      const lenC = carb / 100 * C, lenP = protein / 100 * C, lenF = fat / 100 * C;
      const startC = 0, startP = carb * 3.6, startF = (carb + protein) * 3.6;
      function mid(sd, sp, r) {
        const m = (sd + sp / 2) * Math.PI / 180;
        return { x: (cx + r * Math.sin(m)).toFixed(1), y: (cy - r * Math.cos(m)).toFixed(1) };
      }
      const lC = mid(startC, carb * 3.6, R), lP = mid(startP, protein * 3.6, R), lF = mid(startF, fat * 3.6, R);
      const seg = (len, color, rot) => (
        <circle cx={cx} cy={cy} r={R} fill="none" stroke={color} strokeWidth={SW}
          strokeDasharray={`${len.toFixed(2)} ${(C - len).toFixed(2)}`}
          transform={`rotate(${rot},${cx},${cy})`} />
      );
      return (
        <svg viewBox="0 0 120 120" width="120" height="120" style={{ display: "block" }}>
          {seg(lenF, "#e8a126", startF - 90)}
          {seg(lenP, "#e05a2b", startP - 90)}
          {seg(lenC, "#3385ff", startC - 90)}
          <circle cx={cx} cy={cy} r="27" fill="#fff" />
          {[[lC, carb], [lP, protein], [lF, fat]].map(([l, v], i) => (
            <text key={i} x={l.x} y={l.y} textAnchor="middle" dominantBaseline="central"
              fontFamily="Pretendard,sans-serif" fontSize="10" fontWeight="600" fill="#fff">{v}%</text>
          ))}
        </svg>
      );
    }

    /* =========================================================
       AutoTextarea — 내용 길이에 맞게 높이 자동 조정
       ========================================================= */
    function AutoTextarea({ value, onChange, placeholder, style }) {
      const ref = useRef(null);
      useEffect(() => {
        if (!ref.current) return;
        ref.current.style.height = "auto";
        ref.current.style.height = ref.current.scrollHeight + "px";
      }, [value]);
      return (
        <textarea
          ref={ref}
          value={value}
          onChange={onChange}
          placeholder={placeholder}
          rows={1}
          style={{ resize: "none", overflow: "hidden", ...style }}
        />
      );
    }

          <defs><linearGradient id={gid} x1="0" y1="0" x2="17" y2="0" gradientUnits="userSpaceOnUse"><stop stopColor="#228bed" /><stop offset="1" stopColor="#c509d6" /></linearGradient></defs>
          <path d="M5.655.22C5.948.512 5.948.987 5.655 1.28c-.2.2-.396.394-.587.585C4.136 2.79 3.306 3.614 2.665 4.42c-.362.455-.64.877-.834 1.279.584-.562 1.378-.907 2.252-.907 1.795 0 3.25 1.455 3.25 3.25S5.878 11.292 4.083 11.292c-1.252-.008-2.29-.437-3.008-1.239C.324 9.255 0 8.173 0 7c0-1.297.648-2.453 1.491-3.514C2.192 2.604 3.1 1.704 4.032.779 4.219.594 4.407.407 4.595.22c.292-.293.767-.293 1.06 0Z" fill={`url(#${gid})`} />
          <path d="M14.405.22c.293.293.293.768 0 1.06-.2.2-.396.394-.587.584C12.887 2.79 12.056 3.614 11.415 4.42c-.362.455-.64.877-.834 1.279.584-.562 1.378-.907 2.252-.907 1.795 0 3.25 1.455 3.25 3.25s-1.455 3.25-3.25 3.25c-1.252-.008-2.29-.437-3.008-1.239C9.073 9.255 8.75 8.173 8.75 7c0-1.297.648-2.453 1.491-3.514.701-.879 1.609-1.779 2.541-2.703.187-.186.375-.372.562-.56.293-.292.768-.292 1.061 0Z" fill={`url(#${gid})`} />
        </svg>
      );
    }

    function WorkoutCard({ data }) {
      const dt = data.timestamp ? new Date(data.timestamp.seconds * 1000) : null;
      const ds = dt ? `${String(dt.getFullYear()).slice(2)}. ${dt.getMonth() + 1}. ${dt.getDate()}` : "";
      return (
        <div style={{ padding: "8px 16px" }}>
          <div className="card-enter" style={{ background: "#fff", borderRadius: 16, overflow: "hidden", boxShadow: "0 0 25px rgba(3,27,38,.08)" }}>
            <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 16 }}>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <div style={{ display: "inline-flex", background: "rgba(0,84,209,.1)", padding: "4px 6px 4px 8px", borderRadius: 8, width: "fit-content" }}>
                  <span style={{ fontSize: 13, color: "#0054d1", lineHeight: "18px", letterSpacing: "-.13px" }}>성공 🔥</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 }}>
                  <h3 style={{ fontSize: 18, fontWeight: 600, color: "#171a1d", lineHeight: "28px", letterSpacing: "-.45px", margin: 0, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{data.title || "기록"}</h3>
                  <span style={{ fontSize: 14, color: "#646d76", flexShrink: 0 }}>{ds}</span>
                </div>
              </div>
              <div className="exercise-scroll">
                {data.exercises && data.exercises.length > 0
                  ? data.exercises.map((ex, i) => (
                    <div key={i} style={{ background: "#f1f3f5", borderRadius: 16, padding: 8, display: "flex", flexDirection: "column", gap: 8, alignItems: "center", flexShrink: 0, width: 96 }}>
                      <div style={{ background: "#fff", height: 48, borderRadius: 8, width: "100%" }} />
                      <p style={{ fontSize: 14, fontWeight: 500, color: "#495057", textAlign: "center", lineHeight: "20px", width: 80, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{ex.name}</p>
                    </div>
                  ))
                  : <div style={{ background: "#f1f3f5", borderRadius: 16, padding: 16, width: "100%" }}>
                    <span style={{ fontSize: 14, color: "#495057" }}>{data.originalText || "내용 없음"}</span>
                  </div>
                }
              </div>
            </div>
            {data.aiComment && (
              <div style={{ borderTop: "1px solid #f1f3f5", padding: 16, display: "flex", gap: 8, alignItems: "flex-start" }}>
                <QuoteIcon gid="qG1" />
                <p className="ai-text" style={{ fontSize: 14, fontWeight: 500, lineHeight: "20px", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{data.aiComment}</p>
              </div>
            )}
          </div>
        </div>
      );
    }

    function DietCard({ data }) {
      return (
        <div style={{ padding: "8px 16px" }}>
          <div className="card-enter" style={{ background: "#fff", borderRadius: 16, overflow: "hidden", boxShadow: "0 0 25px rgba(3,27,38,.08)" }}>
            <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 16 }}>
              <div style={{ display: "flex", flexDirection: "column", gap: 8, paddingBottom: 16, borderBottom: "1px solid #f1f3f5" }}>
                <div style={{ display: "inline-flex", background: "rgba(0,84,209,.1)", padding: "4px 6px 4px 8px", borderRadius: 8, width: "fit-content" }}>
                  <span style={{ fontSize: 13, color: "#0054d1" }}>성공 🔥</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <p style={{ fontSize: 24, fontWeight: 600, color: "#171a1d", lineHeight: "32px", letterSpacing: "-.6px", margin: 0 }}>{data.kcal.toLocaleString()} kcal</p>
                  <span style={{ fontSize: 14, color: "#646d76" }}>{data.date}</span>
                </div>
                <p style={{ fontSize: 14, color: "#868e96", margin: 0 }}>목표 {data.goal.toLocaleString()}</p>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                <DonutChart carb={data.carb} protein={data.protein} fat={data.fat} />
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {[["#3385ff", "탄수화물"], ["#e05a2b", "단백질"], ["#e8a126", "지방"]].map(([c, l]) => (
                    <div key={l} style={{ display: "flex", gap: 4, alignItems: "center" }}>
                      <div style={{ width: 10, height: 10, borderRadius: "50%", background: c, flexShrink: 0 }} />
                      <span style={{ fontSize: 12, fontWeight: 500, color: "#adb5bd", whiteSpace: "nowrap" }}>{l}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div style={{ borderTop: "1px solid #f1f3f5", padding: 16, display: "flex", gap: 8, alignItems: "flex-start" }}>
              <QuoteIcon gid="qG2" />
              <p className="ai-text" style={{ fontSize: 14, fontWeight: 500, lineHeight: "20px", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{data.aiComment}</p>
            </div>
          </div>
        </div>
      );
    }

    /* =========================================================
       HomeScreen
       ========================================================= */
    function HomeScreen({ onNavigateToMemo }) {
      const [mainTab, setMainTab] = useState("workout");
      const [fabOpen, setFabOpen] = useState(false);
      const [sheetOpen, setSheetOpen] = useState(false);
      const [inputVal, setInputVal] = useState("");
      const [saving, setSaving] = useState(false);
      const [workoutLogs, setWorkoutLogs] = useState([]);

      useEffect(() => {
        const unsub = db.collection("logs").orderBy("timestamp", "desc").onSnapshot(snap => {
          const docs = [];
          snap.forEach(d => { const data = d.data(); if (!data.type || data.type === "workout") docs.push(data); });
          setWorkoutLogs(docs);
        });
        return () => unsub();
      }, []);

      function handleFabOption(type) {
        setFabOpen(false);
        if (type === "workout") onNavigateToMemo();
        else setSheetOpen(true);
      }

      async function handleSave() {
        if (!inputVal.trim()) return;
        setSaving(true);
        try {
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_KEY}`;
          const prompt = `사용자 텍스트를 분석해 순수 JSON만 반환해라. title:핵심 운동부위 짧은 명사, exercises:[{name,sets:[]}], aiComment:한줄평. 텍스트:${inputVal}`;
          const res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
          const json = await res.json();
          let txt = json.candidates[0].content.parts[0].text.replace(/```json/g, "").replace(/```/g, "").trim();
          const parsed = JSON.parse(txt);
          await db.collection("logs").add({ type: "workout", timestamp: firebase.firestore.FieldValue.serverTimestamp(), originalText: inputVal, title: parsed.title || "새로운 기록", exercises: parsed.exercises || [], aiComment: parsed.aiComment || "완벽하게 기록되었습니다!" });
          setInputVal(""); setSheetOpen(false);
        } catch (e) { alert("AI 파싱 에러: " + e.message); }
        finally { setSaving(false); }
      }

      return (
        <div style={{ display: "flex", flexDirection: "column", height: "100%", overflow: "hidden" }}>
          {/* 헤더 */}
          <header style={{ background: "#fff", borderBottom: "1px solid #f1f3f5", zIndex: 20, flexShrink: 0 }}>
            <div style={{ height: 60, padding: "8px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <img src="./logo.png" alt="로고" style={{ width: 40, height: 40, borderRadius: 8, objectFit: "cover" }} />
              <button style={{ display: "flex", alignItems: "center", gap: 4, color: "#9e9e9e", fontSize: 16, fontWeight: 600, letterSpacing: "-.4px" }}>
                할 일
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <rect x="3" y="4" width="18" height="18" rx="2" />
                  <line x1="16" y1="2" x2="16" y2="6" />
                  <line x1="8" y1="2" x2="8" y2="6" />
                  <line x1="3" y1="10" x2="21" y2="10" />
                </svg>
              </button>
            </div>
            <div style={{ display: "flex", background: "#fff" }}>
              {["workout", "diet"].map(tab => (
                <button key={tab} onClick={() => setMainTab(tab)}
                  style={{ flex: 1, padding: "8px 0", textAlign: "center", fontSize: 16, fontWeight: mainTab === tab ? 600 : 500, color: mainTab === tab ? "#0054d1" : "#9e9e9e", borderBottom: mainTab === tab ? "2px solid #0054d1" : "2px solid transparent", letterSpacing: "-.4px", transition: "all .2s" }}>
                  {tab === "workout" ? "쇠질" : "식단"}
                </button>
              ))}
            </div>
          </header>

          {/* 콘텐츠 */}
          <main style={{ flex: 1, overflowY: "auto", paddingBottom: 120 }}>
            {mainTab === "workout"
              ? workoutLogs.length === 0
                ? <div style={{ textAlign: "center", color: "#9e9e9e", fontSize: 14, marginTop: 40 }}>기록된 쇠질이 없습니다.</div>
                : workoutLogs.map((d, i) => <WorkoutCard key={i} data={d} />)
              : MOCK_DIET.map((d, i) => <DietCard key={i} data={d} />)
            }
          </main>

          {/* FAB 딤 */}
          {fabOpen && <div onClick={() => setFabOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.4)", zIndex: 35 }} />}

          {/* FAB 메뉴 */}
          <div style={{ position: "fixed", bottom: 84, right: 16, zIndex: 40, display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 12 }}>
            <div className={`fab-menu${fabOpen ? " open" : ""}`} style={{ background: "#0054d1", borderRadius: 8, padding: "0 16px" }}>
              <button onClick={() => handleFabOption("workout")} style={{ display: "flex", width: "100%", padding: 8, color: "#fff", fontSize: 14, fontWeight: 600, letterSpacing: "-.35px", whiteSpace: "nowrap" }}>쇠질</button>
              <button onClick={() => handleFabOption("diet")} style={{ display: "flex", width: "100%", padding: 8, color: "#fff", fontSize: 14, fontWeight: 600, letterSpacing: "-.35px", whiteSpace: "nowrap" }}>식단</button>
            </div>
            {!fabOpen && (
              <button onClick={() => setFabOpen(true)} style={{ width: 40, height: 40, background: "#0054d1", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 4px 12px rgba(0,84,209,.4)" }}>
                <IcPencil />
              </button>
            )}
          </div>

          {/* 하단 탭 */}
          <nav style={{ position: "fixed", bottom: 0, width: "100%", background: "#fff", borderTop: "1px solid #e9ecef", borderRadius: "16px 16px 0 0", height: 68, display: "flex", justifyContent: "space-around", alignItems: "center", zIndex: 20, boxShadow: "0 -4px 16px rgba(3,7,19,.06)" }}>
            {[["홈", true], ["분석", false], ["마이", false]].map(([l, a], i) => (
              <button key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2, flex: 1, padding: 8, color: a ? "#0054d1" : "#adb5bd" }}>
                {i === 0 && <IcHome active={a} />}{i === 1 && <IcGrid />}{i === 2 && <IcUser />}
                <span style={{ fontSize: 12, fontWeight: 500, lineHeight: 1.5, letterSpacing: "-.3px" }}>{l}</span>
              </button>
            ))}
          </nav>

          {/* 바텀시트 */}
          {sheetOpen && <div onClick={() => setSheetOpen(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.4)", zIndex: 40 }} />}
          <div className={`bottom-sheet${sheetOpen ? " open" : ""}`} style={{ position: "fixed", bottom: 0, left: 0, width: "100%", background: "#fff", borderRadius: "24px 24px 0 0", padding: "24px 16px 32px", zIndex: 50, boxShadow: "0 -4px 20px rgba(0,0,0,.08)" }}>
            <div style={{ width: 40, height: 4, background: "#e9ecef", borderRadius: 9999, margin: "0 auto 20px" }} />
            <h3 style={{ fontSize: 18, fontWeight: 600, color: "#171a1d", letterSpacing: "-.45px", marginBottom: 16, lineHeight: "28px" }}>🥗 식단 기록</h3>
            <textarea value={inputVal} onChange={e => setInputVal(e.target.value)} style={{ width: "100%", height: 120, background: "#f8f9fa", border: "1.5px solid #e9ecef", borderRadius: 12, padding: "14px 16px", fontSize: 15, fontFamily: "Pretendard,sans-serif", lineHeight: 1.6, color: "#171a1d", outline: "none", resize: "none", marginBottom: 16 }} placeholder="예: 닭가슴살 200g, 현미밥 1공기" />
            <button onClick={handleSave} disabled={saving} style={{ width: "100%", height: 52, background: "#0054d1", color: "#fff", fontSize: 16, fontWeight: 600, letterSpacing: "-.4px", borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 4px 12px rgba(0,84,209,.3)" }}>
              {saving ? "AI 분석 중..." : "AI 자동 기록"}
            </button>
          </div>
        </div>
      );
    }

    /* =========================================================
       App — 화면 라우터
       ========================================================= */
    function App() {
      const [screen, setScreen] = useState("home");
      return (
        <div style={{ position: "fixed", inset: 0, overflow: "hidden" }}>
          <div className={`screen screen-home${screen !== "home" ? " pushed" : ""}`}>
            <HomeScreen onNavigateToMemo={() => setScreen("memo")} />
          </div>
          <div className={`screen screen-memo${screen === "memo" ? " active" : ""}`}>
            <WorkoutMemoScreen onBack={() => setScreen("home")} />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
